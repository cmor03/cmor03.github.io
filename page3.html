<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page3-mixtape</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000033; /* Super dark blue background color */
            background-image: url('stars.jpeg'); /* Background image of little stars */
            background-repeat: repeat;
            background-blend-mode: lighten;
            font-family: "Font Name", helvetica;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            background-color: transparent;
        }

        #message {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            color: rgb(88, 76, 76); /* Text color */
        }

        #mixtape {
            width: 400px;
            height: auto;
            margin-bottom: 20px;
            cursor: pointer;
            
        }

        .sticky-note {
            background-color: #ffee90;
            padding: 20px;
            border-radius: 10px;
            max-width: 80%;
            
        }
    </style>
    <script>
        window.addEventListener('load', function() {
            var mixtapeImage = document.getElementById('mixtape');
            var clicked = false;

            mixtapeImage.addEventListener('click', function() {
                if (!clicked) {
                    mixtapeImage.style.animation = 'shakeAndFlyAnimation 1s forwards';
                    //mixtapeImage.style.animation = 'flyAnimation';

                    clicked = true;
                    setTimeout(function() {
                        window.location.href = 'spotify:playlist:255vA7qBPxVN7TfKxqDwcO'; /* Replace with your Spotify link */
                    }, 1000); /* Delay in milliseconds before opening Spotify link */
                }
            });
        });
    </script>
    <style>
        @keyframes shakeAnimation {
            0% {
                transform: rotate(0deg);
            }
            10% {
                transform: rotate(10deg);
            }
            20% {
                transform: rotate(-10deg);
            }
            30% {
                transform: rotate(10deg);
            }
            40% {
                transform: rotate(-10deg);
            }
            50% {
                transform: rotate(10deg);
            }
            60% {
                transform: rotate(-10deg);
            }
            70% {
                transform: rotate(10deg);
            }
            80% {
                transform: rotate(-10deg);
            }
            90% {
                transform: rotate(10deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes flyAnimation {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(0, 200vh);
            }
        }

        @keyframes shakeAndFlyAnimation {
            0% {
                transform: rotate(0deg);
            }
            10% {
                transform: rotate(10deg);
            }
            20% {
                transform: rotate(-10deg);
            }
            30% {
                transform: rotate(10deg);
            }
            40% {
                transform: rotate(-10deg);
            }
            50% {
                transform: rotate(10deg);
            }
            60% {
                transform: rotate(-10deg);
            }
            70% {
                transform: rotate(10deg);
            }
            80% {
                transform: rotate(-10deg);
            }
            90% {
                transform: rotate(10deg);
            }
            100% {
                transform: rotate(0deg);
                animation: flyAnimation 1s forwards;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="message">
            I thought you might get bored on your roadtrip
        </div>
        <img id="mixtape" src="mixtape.png" alt="mixtape">
        <div class="sticky-note">
            <p> My naivety compels me to express my gratitude for the short time we've spent together. Good luck and Texas
            <br> You're pretty cool.
            <br>
            <br> Colton 
        </p>
        </div>
    </div>
</body>
</html>
