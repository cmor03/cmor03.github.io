<!DOCTYPE html>
<html>
<head>
  <title>page1-password</title>
  <style>
    body {
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 90vh;
      margin: 0;
      font-family: "Font Name", helvetica;
    }

    h1 {
      color: white;
      text-align: center;
      font-size: 85px;
    }

    form {
      margin-top: 20px;
      text-align: center;
    }

    input[type="password"] {
      padding: 8px;
      font-size: 40px;
    }

    button[type="submit"] {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <h1>Enter Password</h1>
  <form id="passwordForm">
    <input type="password" id="passwordInput" placeholder="Password" />
    <button type="submit">Submit</button>
  </form>

  <script>
    document.getElementById("passwordForm").addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent form submission

      // Retrieve the entered password
      var enteredPassword = document.getElementById("passwordInput").value;

      // Compare the entered password with the hardcoded password
      var hardcodedPassword = "mines"; // Replace with your own password
      if (enteredPassword === hardcodedPassword) {
        // Redirect to page 2
        window.location.href = "page2.html";
      } else {
        // Password incorrect, display an error message or take any other action
        alert("Incorrect password. Please try again.");
      }
    });
  </script>
</body>
</html>
